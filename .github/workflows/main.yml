name: Build Rahim DX Image
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # تحديث للإصدار 3

      - name: Login to Docker Hub
        uses: docker/login-action@v2 # تحديث للإصدار 2 لضمان استقرار الاتصال
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4 # تحديث للإصدار 4 لحل مشاكل الصلاحيات
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: rahimodx/rahim-vless-vip:latest
